<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maine RCV Election Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Helvetica Neue", Arial, sans-serif; background: #0d0d10; color: #eaeaf2; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* ── Layout ─────────────────────────────────────── */
#app { display: flex; flex: 1; overflow: hidden; }
#map-container { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }
#sidebar { width: 320px; background: #16161c; border-left: 1px solid #2a2a36; display: flex; flex-direction: column; overflow: hidden; }
#bottom-bar { height: 110px; background: #16161c; border-top: 1px solid #2a2a36; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 24px; gap: 8px; }

/* ── Sidebar ─────────────────────────────────────── */
#sidebar-header { padding: 14px 16px 10px; border-bottom: 1px solid #2a2a36; }
#election-label { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #8888a4; margin-bottom: 4px; }
#round-label { font-size: 15px; font-weight: 700; color: #eaeaf2; }

#election-select { margin-top: 10px; background: #1e1e26; border: 1px solid #2a2a36; color: #eaeaf2; padding: 6px 10px; border-radius: 4px; font-size: 12px; width: 100%; cursor: pointer; }

/* ── Color mode toggle ───────────────────────────── */
#color-modes { display: flex; flex-wrap: wrap; gap: 4px; padding: 10px 16px; border-bottom: 1px solid #2a2a36; }
.mode-btn { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 8px; border-radius: 3px; border: 1px solid #2a2a36; background: #1e1e26; color: #8888a4; cursor: pointer; transition: all 0.2s; }
.mode-btn.active { border-color: currentColor; color: #eaeaf2; opacity: 1; }
.mode-btn:hover { opacity: 0.85; }

/* ── Standings ───────────────────────────────────── */
#standings { flex: 1; overflow-y: auto; padding: 12px 16px; }
.cand-row { margin-bottom: 14px; transition: opacity 0.4s; }
.cand-row.eliminated { opacity: 0.4; }
.cand-name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.cand-name { font-size: 12px; font-weight: 700; }
.cand-name.elim-text { text-decoration: line-through; }
.cand-badge { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 5px; border-radius: 2px; }
.badge-elim { background: #2a2a36; color: #8888a4; }
.badge-winner { background: #b8963c; color: #0d0d10; }
.cand-bar-bg { height: 6px; background: #1e1e26; border-radius: 3px; overflow: hidden; }
.cand-bar { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.cand-stats { display: flex; justify-content: space-between; margin-top: 3px; font-size: 11px; font-variant-numeric: tabular-nums; }
.cand-total { color: #eaeaf2; font-weight: 600; }
.cand-pct { color: #8888a4; }
.cand-delta { font-size: 10px; font-weight: 700; }

#ballot-summary { padding: 12px 16px; border-top: 1px solid #2a2a36; font-size: 11px; color: #8888a4; font-variant-numeric: tabular-nums; }
.ballot-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
.ballot-val { color: #eaeaf2; }

/* ── Stepper ─────────────────────────────────────── */
#stepper { display: flex; align-items: center; gap: 0; width: 100%; max-width: 700px; }
.step-node { display: flex; flex-direction: column; align-items: center; cursor: pointer; position: relative; flex-shrink: 0; }
.step-circle { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #2a2a36; background: #16161c; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #8888a4; transition: all 0.3s; position: relative; z-index: 1; }
.step-circle.completed { background: #b8963c; border-color: #b8963c; color: #0d0d10; }
.step-circle.current { border-color: currentColor; color: #eaeaf2; background: #1e1e26; }
.step-circle.current::after { content: ''; position: absolute; width: 40px; height: 40px; border-radius: 50%; border: 2px solid currentColor; opacity: 0.5; animation: pulse-ring 1.5s ease-out infinite; }
.step-circle.locked { cursor: not-allowed; opacity: 0.4; }
.step-label { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #8888a4; margin-top: 4px; text-align: center; white-space: nowrap; }
.step-label.current { color: #eaeaf2; }
.step-connector { flex: 1; height: 2px; background: #2a2a36; margin: 0 2px; margin-bottom: 18px; transition: background 0.4s; }
.step-connector.completed { background: #b8963c; }
@keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(1.4); opacity: 0; } }

/* ── Scrubber ─────────────────────────────────────── */
#scrubber { width: 100%; max-width: 700px; }
#scrubber input { width: 100%; accent-color: #b8963c; cursor: pointer; }

/* ── Tooltip ─────────────────────────────────────── */
#tooltip { position: absolute; bottom: 16px; left: 16px; background: #16161c; border: 1px solid #2a2a36; border-radius: 6px; padding: 12px; min-width: 200px; max-width: 260px; z-index: 1000; pointer-events: none; display: none; }
#tooltip.visible { display: block; }
#tt-town { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
#tt-county { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #8888a4; margin-bottom: 10px; }
.tt-cand-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px; font-variant-numeric: tabular-nums; }
.tt-cand-name { color: #8888a4; }
.tt-cand-val { font-weight: 600; }
#tt-received { margin-top: 8px; padding-top: 8px; border-top: 1px solid #2a2a36; }
#tt-recv-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #8888a4; margin-bottom: 4px; }
#tt-exhausted { margin-top: 6px; font-size: 11px; color: #8888a4; }
#tt-nodata { font-size: 12px; color: #8888a4; font-style: italic; }

/* ── Leaflet overrides ───────────────────────────── */
.leaflet-container { background: #0d0d10; }
.leaflet-control-zoom a { background: #1e1e26; color: #eaeaf2; border-color: #2a2a36; }
.leaflet-control-zoom a:hover { background: #2a2a36; }
.leaflet-control-attribution { background: rgba(13,13,16,0.7) !important; color: #8888a4 !important; }
.leaflet-control-attribution a { color: #b8963c !important; }
@media (max-width: 768px) {
  .leaflet-control-attribution { position: fixed !important; bottom: 110px !important; right: 4px !important; font-size: 9px !important; max-width: 60vw; }
}

/* ── Mobile ──────────────────────────────────────── */
@media (max-width: 768px) {
  body { overflow: hidden; }
  #app { flex-direction: column; }
  #sidebar { display: none; }
  #bottom-bar { display: none; }
  #tooltip { display: none !important; }
  /* map fills full screen, bottom padding makes room for fixed controls */
  #map-container { flex: 1; }
  #map { height: calc(100vh - 105px); }

  /* pin info strip + round nav to bottom of screen */
  #mobile-info-strip {
    position: fixed;
    bottom: 58px;
    left: 0; right: 0;
    z-index: 500;
  }
  #mobile-round-nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    z-index: 500;
  }
}

/* ── Mobile Info Strip ───────────────────────────── */
#mobile-info-strip {
  display: none;
  background: #16161c;
  border-top: 1px solid #2a2a36;
  padding: 8px 14px;
  cursor: pointer;
  user-select: none;
  flex-shrink: 0;
}
#mobile-strip-round { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #b8963c; margin-bottom: 4px; }
#mobile-strip-bars { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.mobile-strip-cand { display: flex; align-items: center; gap: 4px; font-size: 11px; font-variant-numeric: tabular-nums; }
.mobile-strip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.mobile-strip-name { color: #8888a4; }
.mobile-strip-pct { color: #eaeaf2; font-weight: 700; }

/* ── Mobile Round Nav ────────────────────────────── */
#mobile-round-nav {
  display: none;
  background: #16161c;
  border-top: 1px solid #2a2a36;
  padding: 10px 14px;
  flex-shrink: 0;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.mobile-nav-btn {
  background: #1e1e26;
  border: 1px solid #2a2a36;
  color: #eaeaf2;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 9px 14px;
  border-radius: 4px;
  cursor: pointer;
  min-width: 70px;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
}
.mobile-nav-btn:active { background: #2a2a36; }
.mobile-nav-btn:disabled { opacity: 0.35; cursor: default; }
.mobile-nav-btn.replay-btn { min-width: 56px; color: #b8963c; border-color: #b8963c44; }
#mobile-round-label { font-size: 12px; font-weight: 700; color: #eaeaf2; text-align: center; flex: 1; }

@media (max-width: 768px) {
  #mobile-info-strip { display: block; }
  #mobile-round-nav { display: flex; }
}

/* ── Town Bottom Sheet ───────────────────────────── */
#town-sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #16161c;
  border-top: 1px solid #2a2a36;
  border-radius: 12px 12px 0 0;
  z-index: 1100;
  max-height: 60vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
  -webkit-overflow-scrolling: touch;
}
#town-sheet.open { transform: translateY(0); }
#town-sheet-handle { display: flex; justify-content: center; padding: 10px 0 4px; }
#town-sheet-handle-bar { width: 40px; height: 4px; border-radius: 2px; background: #2a2a36; }
#town-sheet-content { padding: 4px 18px 24px; }
#ts-town-name { font-size: 18px; font-weight: 700; color: #b8963c; margin-bottom: 2px; }
#ts-county { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #8888a4; margin-bottom: 12px; }
.ts-cand-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.ts-cand-left { display: flex; align-items: center; gap: 7px; }
.ts-cand-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.ts-cand-name { font-size: 12px; font-weight: 700; }
.ts-cand-right { text-align: right; font-size: 12px; font-variant-numeric: tabular-nums; }
.ts-cand-votes { font-weight: 700; color: #eaeaf2; }
.ts-cand-pct { color: #8888a4; margin-left: 6px; }
#ts-received-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid #2a2a36; }
#ts-recv-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #8888a4; margin-bottom: 6px; }
.ts-recv-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; font-variant-numeric: tabular-nums; color: #8888a4; }
.ts-recv-name { font-weight: 600; }
.ts-recv-val { color: #eaeaf2; }
#ts-exhausted { margin-top: 6px; font-size: 11px; color: #8888a4; }
#ts-nodata { font-size: 12px; color: #8888a4; font-style: italic; }
#town-sheet-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 12px; border-top: 1px solid #2a2a36; }
#ts-pin-btn, #ts-close-btn {
  background: #1e1e26;
  border: 1px solid #2a2a36;
  color: #eaeaf2;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 6px 12px;
  border-radius: 3px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#ts-pin-btn.pinned { border-color: #b8963c; color: #b8963c; }
#ts-close-btn { color: #8888a4; }

/* ── Standings Bottom Sheet ──────────────────────── */
#standings-sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #16161c;
  border-top: 1px solid #2a2a36;
  border-radius: 12px 12px 0 0;
  z-index: 1200;
  max-height: 70vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
  -webkit-overflow-scrolling: touch;
}
#standings-sheet.open { transform: translateY(0); }
#standings-sheet-handle { display: flex; justify-content: center; padding: 10px 0 4px; }
#standings-sheet-handle-bar { width: 40px; height: 4px; border-radius: 2px; background: #2a2a36; }
#standings-sheet-content { padding: 4px 18px 24px; }
#ss-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #8888a4; margin-bottom: 12px; }
#ss-close { display: block; margin: 16px auto 0; background: #1e1e26; border: 1px solid #2a2a36; color: #8888a4; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 20px; border-radius: 3px; cursor: pointer; }

/* ── Sheet backdrop ──────────────────────────────── */
#sheet-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 1050;
}
#sheet-backdrop.visible { display: block; }
</style>
</head>
<body>

<div id="app">
  <!-- Map -->
  <div id="map-container">
    <div id="map"></div>
    <div id="tooltip">
      <div id="tt-town"></div>
      <div id="tt-county"></div>
      <div id="tt-body"></div>
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div id="election-label">Maine RCV</div>
      <div id="round-label">Round 1</div>
      <select id="election-select"></select>
    </div>
    <div id="color-modes"></div>
    <div id="standings"></div>
    <div id="ballot-summary">
      <div class="ballot-row"><span>Total ballots</span><span class="ballot-val" id="stat-total">—</span></div>
      <div class="ballot-row"><span>Continuing</span><span class="ballot-val" id="stat-continuing">—</span></div>
      <div class="ballot-row"><span>Exhausted this round</span><span class="ballot-val" id="stat-exhausted">—</span></div>
    </div>
  </div>
</div>

<!-- Bottom Bar (desktop) -->
<div id="bottom-bar">
  <div id="stepper"></div>
  <div id="scrubber"><input type="range" id="scrubber-input" min="0" step="1" value="0"></div>
</div>

<!-- Mobile Info Strip -->
<div id="mobile-info-strip">
  <div id="mobile-strip-round">Round 1</div>
  <div id="mobile-strip-bars"></div>
</div>

<!-- Mobile Round Navigation -->
<div id="mobile-round-nav">
  <button class="mobile-nav-btn" id="mob-prev-btn">&#8592; BACK</button>
  <span id="mobile-round-label">Round 1 of 1</span>
  <button class="mobile-nav-btn replay-btn" id="mob-replay-btn">&#8635;</button>
  <button class="mobile-nav-btn" id="mob-next-btn">NEXT &#8594;</button>
</div>

<!-- Sheet backdrop -->
<div id="sheet-backdrop"></div>

<!-- Town Bottom Sheet -->
<div id="town-sheet">
  <div id="town-sheet-handle"><div id="town-sheet-handle-bar"></div></div>
  <div id="town-sheet-content">
    <div id="ts-town-name"></div>
    <div id="ts-county"></div>
    <div id="ts-body"></div>
    <div id="town-sheet-footer">
      <button id="ts-pin-btn">&#128204; PIN</button>
      <button id="ts-close-btn">CLOSE &#10005;</button>
    </div>
  </div>
</div>

<!-- Standings Bottom Sheet -->
<div id="standings-sheet">
  <div id="standings-sheet-handle"><div id="standings-sheet-handle-bar"></div></div>
  <div id="standings-sheet-content">
    <div id="ss-title">District Standings</div>
    <div id="ss-standings-body"></div>
    <button id="ss-close">CLOSE</button>
  </div>
</div>

// ═══════════════════════════════════════════════════════════════════
// COLOR ENGINE — all colors derived from meta.candidates, never hardcoded
// ═══════════════════════════════════════════════════════════════════
function getCandidateColor(candId) {
  if (!electionData) return '#555';
  const c = electionData.meta.candidates.find(c => c.id === candId);
  return c ? c.color : '#555';
}

function getLeader(townData, round) {
  const votes = townData.rounds[String(round)]?.votes || {};
  let leader = null, max = -1;
  for (const [c, v] of Object.entries(votes)) {
    if (v > max) { max = v; leader = c; }
  }
  return leader;
}

function getTownColor(townKey, round) {
  const town = electionData.towns[townKey];
  if (!town) return '#1e1e26';
  const rd = town.rounds[String(round)];
  if (!rd) return '#1e1e26';
  const votes = rd.votes;
  const total = Object.values(votes).reduce((a,b)=>a+b,0);
  if (total === 0) return '#1e1e26';

  if (colorMode === 'winner') {
    const leader = getLeader(town, round);
    return leader ? getCandidateColor(leader) : '#1e1e26';
  }

  if (colorMode === 'shift') {
    if (round === 1) return '#2a2a36';
    const recv = rd.received;
    if (!recv || Object.keys(recv).length === 0) return '#2a2a36';
    let maxRecv = -1, maxCand = null;
    for (const [c, v] of Object.entries(recv)) {
      if (v > maxRecv) { maxRecv = v; maxCand = c; }
    }
    if (!maxCand || maxRecv === 0) return '#2a2a36';
    const intensity = Math.min(maxRecv / Math.max(total * 0.05, 1), 1);
    return d3.interpolateRgb('#2a2a36', getCandidateColor(maxCand))(intensity);
  }

  // Per-candidate intensity modes
  if (colorMode.startsWith('cand_')) {
    const candId = colorMode.replace('cand_', '');
    const candVotes = votes[candId] || 0;
    const share = candVotes / Math.max(total, 1);
    return d3.interpolateRgb('#0d0d10', getCandidateColor(candId))(Math.pow(share, 0.6));
  }

  return '#1e1e26';
}

// GEO LAYER
// ═══════════════════════════════════════════════════════════════════
function buildGeoLayer() {
  if (geoLayer) geoLayer.remove();

  geoLayer = L.geoJSON(GEOJSON, {
    style: feature => {
      const name = feature.properties.NAME.toUpperCase();
      return {
        fillColor: getTownColor(name, currentRound),
        fillOpacity: 0.75,
        color: '#2a2a36',
        weight: 0.5
      };
    },
    onEachFeature: (feature, layer) => {
      if (isMobile()) {
        layer.on('click', e => { handleMobileTownTap(e); });
      } else {
        layer.on({
          mouseover: e => { showTooltip(feature.properties); highlightLayer(e.target); },
          mouseout: e => { hideTooltip(); resetLayerStyle(e.target); },
          click: e => { showTooltip(feature.properties); }
        });
      }
    }
  }).addTo(map);
}

function highlightLayer(layer) {
  layer.setStyle({ color: '#ffffff', weight: 1.5, fillOpacity: 0.9 });
  layer.bringToFront();
}

function resetLayerStyle(layer) {
  geoLayer.resetStyle(layer);
}

// ═══════════════════════════════════════════════════════════════════
// TRANSITIONS
// ═══════════════════════════════════════════════════════════════════
function updateMapColors(animate) {
  if (!geoLayer) return;

  geoLayer.eachLayer(layer => {
    const name = layer.feature.properties.NAME.toUpperCase();
    const newColor = getTownColor(name, currentRound);

    if (!animate || scrubbing) {
      layer.setStyle({ fillColor: newColor });
      return;
    }

    // Check if eliminated candidates had high combined share in this town (pulse effect)
    const town = electionData.towns[name];
    const elimRaw = electionData.meta.rounds.find(r => r.round === currentRound)?.eliminated;
    const elimList = elimRaw ? (Array.isArray(elimRaw) ? elimRaw : [elimRaw]) : [];
    let duration = 600;
    let doPulse = false;
    let pulseElimCand = null;

    if (town && elimList.length > 0 && currentRound > 1) {
      const prevRd = town.rounds[String(currentRound - 1)];
      if (prevRd) {
        const prevTotal = Object.values(prevRd.votes).reduce((a,b)=>a+b,0);
        const elimVotes = elimList.reduce((sum, e) => sum + (prevRd.votes[e] || 0), 0);
        // Pick the eliminated candidate with the most votes for pulse color
        pulseElimCand = elimList.reduce((best, e) =>
          (prevRd.votes[e] || 0) > (prevRd.votes[best] || 0) ? e : best, elimList[0]);
        if (prevTotal > 0 && elimVotes / prevTotal > 0.15) doPulse = true;
        else if (elimVotes === 0) duration = 150;
      }
    }

    const startColor = layer.options.fillColor || '#1e1e26';
    const endColor = newColor;

    if (doPulse && pulseElimCand) {
      const elimColor = getCandidateColor(pulseElimCand);
      layer.setStyle({ fillColor: elimColor });
      setTimeout(() => {
        animateColor(layer, elimColor, endColor, 400);
      }, 200);
    } else {
      animateColor(layer, startColor, endColor, duration);
    }
  });
}

function animateColor(layer, from, to, duration) {
  const start = performance.now();
  const interpolator = d3.interpolateRgb(from, to);
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    layer.setStyle({ fillColor: interpolator(t) });
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ═══════════════════════════════════════════════════════════════════
// STANDINGS PANEL
// ═══════════════════════════════════════════════════════════════════
function updateStandings() {
  const meta = electionData.meta;
  const roundInfo = meta.rounds.find(r => r.round === currentRound);

  document.getElementById('round-label').textContent = roundInfo?.label || `Round ${currentRound}`;

  // Compute district totals for current round
  const totals = meta.district_totals[String(currentRound)] || {};
  const prevTotals = currentRound > 1 ? (meta.district_totals[String(currentRound-1)] || {}) : {};
  const continuing = Object.values(totals).reduce((a,b)=>a+b,0);

  // Active candidates (surviving this round)
  const activeIds = Object.keys(totals);
  // Flatten eliminated lists across rounds into a single array of candidate ids
  const eliminatedSoFar = meta.rounds
    .filter(r => r.round < currentRound && r.eliminated)
    .flatMap(r => Array.isArray(r.eliminated) ? r.eliminated : [r.eliminated]);

  // Sort by votes desc
  const sorted = [...activeIds].sort((a,b) => (totals[b]||0)-(totals[a]||0));
  const allCands = [...sorted, ...eliminatedSoFar.filter(e => !sorted.includes(e))];

  const container = document.getElementById('standings');
  container.innerHTML = '';

  for (const candId of allCands) {
    const cand = meta.candidates.find(c => c.id === candId);
    if (!cand) continue;
    const isElim = eliminatedSoFar.includes(candId);
    const isWinner = roundInfo?.winner === candId;
    const votes = totals[candId] || 0;
    const pct = continuing > 0 ? (votes/continuing*100).toFixed(1) : '0.0';
    const prev = prevTotals[candId] || 0;
    const delta = votes - prev;

    const row = document.createElement('div');
    row.className = `cand-row${isElim ? ' eliminated' : ''}`;

    let badge = '';
    if (isElim) badge = `<span class="cand-badge badge-elim">Eliminated</span>`;
    if (isWinner) badge = `<span class="cand-badge badge-winner">Winner</span>`;

    let deltaHtml = '';
    if (currentRound > 1 && !isElim) {
      const sign = delta >= 0 ? '+' : '';
      const arrow = delta >= 0 ? '▲' : '▼';
      deltaHtml = `<span class="cand-delta" style="color:${cand.color}">${sign}${delta.toLocaleString()} ${arrow}</span>`;
    }

    const barWidth = continuing > 0 ? (votes/continuing*100).toFixed(1) : 0;

    row.innerHTML = `
      <div class="cand-name-row">
        <span class="cand-name${isElim ? ' elim-text' : ''}" style="color:${cand.color}">${cand.name}</span>
        ${badge}
      </div>
      <div class="cand-bar-bg"><div class="cand-bar" style="width:${barWidth}%;background:${cand.color}"></div></div>
      <div class="cand-stats">
        <span class="cand-total">${votes.toLocaleString()}</span>
        <span class="cand-pct">${pct}%</span>
        ${deltaHtml}
      </div>`;
    container.appendChild(row);
  }

  // Ballot summary
  const totalBallots = meta.total_ballots;
  const exhaustedThisRound = Object.values(electionData.towns)
    .reduce((sum, t) => sum + (t.rounds[String(currentRound)]?.exhausted || 0), 0);

  document.getElementById('stat-total').textContent = totalBallots.toLocaleString();
  document.getElementById('stat-continuing').textContent = continuing.toLocaleString();
  document.getElementById('stat-exhausted').textContent = exhaustedThisRound.toLocaleString();
}

// ═══════════════════════════════════════════════════════════════════
// STEPPER
// ═══════════════════════════════════════════════════════════════════
function buildStepper() {
  const rounds = electionData.meta.rounds;
  const container = document.getElementById('stepper');
  container.innerHTML = '';

  rounds.forEach((r, i) => {
    // Connector before node (except first)
    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = `step-connector${r.round <= currentRound ? ' completed' : ''}`;
      conn.id = `conn-${r.round}`;
      container.appendChild(conn);
    }

    const node = document.createElement('div');
    node.className = 'step-node';

    const elimIds = r.eliminated ? (Array.isArray(r.eliminated) ? r.eliminated : [r.eliminated]) : [];
    const elimCand = elimIds.length > 0 ? electionData.meta.candidates.find(c=>c.id===elimIds[0]) : null;
    const winnerCand = r.winner ? electionData.meta.candidates.find(c=>c.id===r.winner) : null;
    const ringColor = elimCand ? elimCand.color : (winnerCand ? winnerCand.color : '#b8963c');

    let circleClass = 'step-circle';
    if (r.round < currentRound) circleClass += ' completed';
    else if (r.round === currentRound) circleClass += ' current';

    node.innerHTML = `
      <div class="${circleClass}" id="step-circle-${r.round}" style="${r.round===currentRound?`color:${ringColor}`:''}">${r.round}</div>
      <div class="step-label${r.round===currentRound?' current':''}" id="step-label-${r.round}">${r.label}</div>`;

    node.addEventListener('click', () => goToRound(r.round, true));
    container.appendChild(node);
  });

  // Update scrubber
  const scrubber = document.getElementById('scrubber-input');
  scrubber.max = rounds.length - 1;
  scrubber.value = currentRound - 1;
}

function updateStepper() {
  const rounds = electionData.meta.rounds;
  rounds.forEach(r => {
    const circle = document.getElementById(`step-circle-${r.round}`);
    const label = document.getElementById(`step-label-${r.round}`);
    const conn = document.getElementById(`conn-${r.round}`);
    if (!circle) return;

    const elimIds2 = r.eliminated ? (Array.isArray(r.eliminated) ? r.eliminated : [r.eliminated]) : [];
    const elimCand = elimIds2.length > 0 ? electionData.meta.candidates.find(c=>c.id===elimIds2[0]) : null;
    const winnerCand = r.winner ? electionData.meta.candidates.find(c=>c.id===r.winner) : null;
    const ringColor = elimCand ? elimCand.color : (winnerCand ? winnerCand.color : '#b8963c');

    circle.className = 'step-circle' + (r.round < currentRound ? ' completed' : r.round === currentRound ? ' current' : '');
    circle.style.color = r.round === currentRound ? ringColor : '';
    label.className = 'step-label' + (r.round === currentRound ? ' current' : '');

    if (conn) conn.className = `step-connector${r.round <= currentRound ? ' completed' : ''}`;
  });

  document.getElementById('scrubber-input').value = currentRound - 1;
}

// ═══════════════════════════════════════════════════════════════════
// COLOR MODE CONTROLS
// ═══════════════════════════════════════════════════════════════════
function buildColorModes() {
  const container = document.getElementById('color-modes');
  container.innerHTML = '';

  const modes = [
    { id: 'winner', label: 'Leader' },
    { id: 'shift',  label: 'Shift' },
    ...electionData.meta.candidates.map(c => ({ id: `cand_${c.id}`, label: c.name.split(' ')[1] || c.name, color: c.color }))
  ];

  modes.forEach(m => {
    const btn = document.createElement('button');
    btn.className = `mode-btn${colorMode===m.id?' active':''}`;
    btn.textContent = m.label;
    if (m.color) btn.style.color = m.color;
    btn.dataset.mode = m.id;
    btn.addEventListener('click', () => {
      colorMode = m.id;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode===m.id));
      updateMapColors(false);
    });
    container.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════════════════════
function showTooltip(props) {
  const name = props.NAME.toUpperCase();
  const county = props.COUNTY || '';
  const town = electionData?.towns[name];
  const tt = document.getElementById('tooltip');

  document.getElementById('tt-town').textContent = props.NAME;
  document.getElementById('tt-county').textContent = county ? `${county} County` : '';

  const body = document.getElementById('tt-body');
  body.innerHTML = '';

  if (!town) {
    body.innerHTML = '<div id="tt-nodata">No CVR data available</div>';
    tt.classList.add('visible');
    return;
  }

  const rd = town.rounds[String(currentRound)];
  if (!rd) { body.innerHTML = '<div id="tt-nodata">No data for this round</div>'; tt.classList.add('visible'); return; }

  const votes = rd.votes;
  const total = Object.values(votes).reduce((a,b)=>a+b,0);

  // Sort candidates by votes
  const sorted = Object.entries(votes).sort((a,b)=>b[1]-a[1]);
  for (const [candId, v] of sorted) {
    const cand = electionData.meta.candidates.find(c=>c.id===candId);
    if (!cand) continue;
    const pct = total>0 ? (v/total*100).toFixed(1) : '0.0';
    const row = document.createElement('div');
    row.className = 'tt-cand-row';
    row.innerHTML = `<span class="tt-cand-name" style="color:${cand.color}">${cand.name}</span><span class="tt-cand-val" style="color:${cand.color}">${v.toLocaleString()} (${pct}%)</span>`;
    body.appendChild(row);
  }

  // Transfers received this round
  if (currentRound > 1 && rd.received && Object.keys(rd.received).length > 0) {
    const elimRound = electionData.meta.rounds.find(r=>r.round===currentRound);
    const elimIdRaw = elimRound?.eliminated;
    const elimIds3 = elimIdRaw ? (Array.isArray(elimIdRaw) ? elimIdRaw : [elimIdRaw]) : [];
    const elimNames = elimIds3
      .map(id => electionData.meta.candidates.find(c=>c.id===id)?.name)
      .filter(Boolean)
      .join(' & ');

    const recvDiv = document.createElement('div');
    recvDiv.id = 'tt-received';
    recvDiv.innerHTML = `<div id="tt-recv-label">Received from ${elimNames || 'eliminated'}</div>`;
    for (const [c, v] of Object.entries(rd.received)) {
      const cand = electionData.meta.candidates.find(x=>x.id===c);
      if (!cand || v===0) continue;
      const rr = document.createElement('div');
      rr.className = 'tt-cand-row';
      rr.innerHTML = `<span class="tt-cand-name" style="color:${cand.color}">→ ${cand.name}</span><span class="tt-cand-val">+${v.toLocaleString()}</span>`;
      recvDiv.appendChild(rr);
    }
    body.appendChild(recvDiv);
  }

  if (rd.exhausted > 0) {
    const exhDiv = document.createElement('div');
    exhDiv.id = 'tt-exhausted';
    exhDiv.textContent = `Exhausted: ${rd.exhausted.toLocaleString()}`;
    body.appendChild(exhDiv);
  }

  tt.classList.add('visible');
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

// ═══════════════════════════════════════════════════════════════════
// ROUND NAVIGATION
// ═══════════════════════════════════════════════════════════════════
function goToRound(round, animate) {
  const rounds = electionData.meta.rounds;
  if (round < 1 || round > rounds.length) return;
  currentRound = round;
  updateMapColors(animate && !scrubbing);
  updateStandings();
  updateStepper();
  if (isMobile()) {
    updateMobileStrip();
    updateTownSheetIfOpen();
    if (standingsSheetOpen) buildStandingsSheetContent();
  }
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goToRound(currentRound + 1, true);
  if (e.key === 'ArrowLeft')  goToRound(currentRound - 1, true);
});

// Scrubber
const scrubberInput = document.getElementById('scrubber-input');
scrubberInput.addEventListener('input', () => {
  scrubbing = true;
  goToRound(parseInt(scrubberInput.value) + 1, false);
});
scrubberInput.addEventListener('change', () => {
  scrubbing = false;
  goToRound(parseInt(scrubberInput.value) + 1, true);
});

// ═══════════════════════════════════════════════════════════════════
// ELECTION TOGGLE
// ═══════════════════════════════════════════════════════════════════
function populateElectionSelect() {
  const sel = document.getElementById('election-select');
  sel.innerHTML = '';
  for (const [id, info] of Object.entries(ELECTIONS)) {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = info.label + (info.status === 'coming_soon' ? ' (coming soon)' : '');
    if (id === currentElection) opt.selected = true;
    if (info.status === 'coming_soon') opt.disabled = true;
    sel.appendChild(opt);
  }
}

document.getElementById('election-select').addEventListener('change', e => {
  currentElection = e.target.value;
  currentRound = 1;
  colorMode = 'winner';
  loadElection();
});

function loadElection() {
  const info = ELECTIONS[currentElection];
  if (!info || !DATA[info.dataKey]) {
    console.warn('No data for', currentElection);
    return;
  }
  electionData = DATA[info.dataKey];
  currentRound = 1;
  buildColorModes();
  buildStepper();
  buildGeoLayer();
  updateMapColors(false);  // paint towns immediately after layer is built
  updateStandings();
  if (isMobile()) {
    // Invalidate size first so Leaflet knows the map height changed, then fit bounds
    setTimeout(() => {
      map.invalidateSize();
      try { map.fitBounds(geoLayer.getBounds(), { padding: [10, 10] }); } catch(e) {}
    }, 50);
    updateMobileStrip();
  }
}

// ═══════════════════════════════════════════════════════════════════
// INIT — fetch manifest, then load first available election
// ═══════════════════════════════════════════════════════════════════
async function init() {
  try {
    const resp = await fetch('data/manifest.json');
    const manifest = await resp.json();

    // Build ELECTIONS from manifest entries that have embedded data
    for (const entry of manifest) {
      if (DATA[entry.id]) {
        ELECTIONS[entry.id] = { label: entry.label, dataKey: entry.id, status: entry.status };
      }
    }

    // Default to first available election
    currentElection = Object.keys(ELECTIONS)[0] || '2018_cd2_dem';
  } catch (e) {
    // Fallback if manifest fetch fails: use embedded DATA keys
    console.warn('manifest.json not found, falling back to embedded DATA keys', e);
    for (const key of Object.keys(DATA)) {
      ELECTIONS[key] = { label: key, dataKey: key, status: 'available' };
    }
    currentElection = Object.keys(ELECTIONS)[0];
  }

  populateElectionSelect();
  loadElection();
}

// Mobile state
let selectedTown = null;
let townSheetOpen = false;
let standingsSheetOpen = false;
let townPinned = false;

// ── Mobile town bottom sheet ──────────────────────────────────────
function buildTownSheetContent(townName) {
  const name = townName.toUpperCase();
  const town = electionData?.towns[name];
  const body = document.getElementById('ts-body');
  body.innerHTML = '';

  document.getElementById('ts-town-name').textContent = townName;
  document.getElementById('ts-county').textContent =
    town?.county ? town.county + ' County' : '';

  if (!town) {
    body.innerHTML = '<div id="ts-nodata">No CVR data available</div>';
    return;
  }

  const rd = town.rounds[String(currentRound)];
  if (!rd) {
    body.innerHTML = '<div id="ts-nodata">No data for this round</div>';
    return;
  }

  const votes = rd.votes;
  const total = rd.continuing || Object.values(votes).reduce((a,b)=>a+b,0);
  const sorted = Object.entries(votes).sort((a,b)=>b[1]-a[1]);

  for (const [candId, v] of sorted) {
    const cand = electionData.meta.candidates.find(c=>c.id===candId);
    if (!cand) continue;
    const pct = total > 0 ? (v/total*100).toFixed(1) : '0.0';
    const row = document.createElement('div');
    row.className = 'ts-cand-row';
    row.innerHTML = `
      <div class="ts-cand-left">
        <div class="ts-cand-dot" style="background:${cand.color}"></div>
        <span class="ts-cand-name" style="color:${cand.color}">${cand.name}</span>
      </div>
      <div class="ts-cand-right">
        <span class="ts-cand-votes">${v.toLocaleString()}</span>
        <span class="ts-cand-pct">${pct}%</span>
      </div>`;
    body.appendChild(row);
  }

  // RCV transfers received
  if (currentRound > 1 && rd.received && Object.keys(rd.received).length > 0) {
    const recvSec = document.createElement('div');
    recvSec.id = 'ts-received-section';
    const elimRound = electionData.meta.rounds.find(r=>r.round===currentRound);
    const elimIdRaw = elimRound?.eliminated;
    const elimIds = elimIdRaw ? (Array.isArray(elimIdRaw) ? elimIdRaw : [elimIdRaw]) : [];
    const elimNames = elimIds.map(id=>electionData.meta.candidates.find(c=>c.id===id)?.name).filter(Boolean).join(' & ');
    recvSec.innerHTML = `<div id="ts-recv-label">Transfers from ${elimNames || 'eliminated'}</div>`;
    for (const [c, v] of Object.entries(rd.received)) {
      if (!v || v === 0) continue;
      const cand = electionData.meta.candidates.find(x=>x.id===c);
      if (!cand) continue;
      const rr = document.createElement('div');
      rr.className = 'ts-recv-row';
      rr.innerHTML = `<span class="ts-recv-name" style="color:${cand.color}">→ ${cand.name}</span><span class="ts-recv-val">+${v.toLocaleString()}</span>`;
      recvSec.appendChild(rr);
    }
    body.appendChild(recvSec);
  }

  if (rd.exhausted > 0) {
    const exh = document.createElement('div');
    exh.id = 'ts-exhausted';
    exh.textContent = 'Exhausted: ' + rd.exhausted.toLocaleString();
    body.appendChild(exh);
  }
}

function openTownSheet(townName) {
  selectedTown = townName;
  townSheetOpen = true;
  buildTownSheetContent(townName);
  document.getElementById('town-sheet').classList.add('open');
  // Update pin button state
  document.getElementById('ts-pin-btn').classList.toggle('pinned', townPinned);
  showBackdrop('town');
}

function closeTownSheet() {
  townSheetOpen = false;
  townPinned = false;
  selectedTown = null;
  document.getElementById('town-sheet').classList.remove('open');
  document.getElementById('ts-pin-btn').classList.remove('pinned');
  hideBackdrop();
}

function updateTownSheetIfOpen() {
  if (townSheetOpen && selectedTown) {
    buildTownSheetContent(selectedTown);

}

// ── Mobile standings bottom sheet ─────────────────────────────────

  const meta = electionData?.meta;
  if (!meta) return;
  const body = document.getElementById('ss-standings-body');
  body.innerHTML = '';

  const totals = meta.district_totals[String(currentRound)] || {};
  const prevTotals = currentRound > 1 ? (meta.district_totals[String(currentRound-1)] || {}) : {};
  const continuing = Object.values(totals).reduce((a,b)=>a+b,0);
  const sorted = Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const elimSoFar = meta.rounds.filter(r=>r.round<currentRound&&r.eliminated).map(r=>r.eliminated).flat();

  for (const [candId, votes] of sorted) {
    const cand = meta.candidates.find(c=>c.id===candId);
    if (!cand) continue;
    const pct = continuing > 0 ? (votes/continuing*100).toFixed(1) : '0.0';
    const prev = prevTotals[candId] || 0;
    const delta = votes - prev;
    const isElim = elimSoFar.includes(candId);

      const sign = delta >= 0 ? '+' : '';
      const arrow = delta >= 0 ? '▲' : '▼';
      deltaHtml = `<span class="cand-delta" style="color:${cand.color}">${sign}${delta.toLocaleString()} ${arrow}</span>`;
    }
    const barWidth = continuing > 0 ? (votes/continuing*100).toFixed(1) : 0;
    row.innerHTML = `
      <div class="cand-name-row">
        <span class="cand-name${isElim?' elim-text':''}" style="color:${cand.color}">${cand.name}</span>
        ${badge}
      </div>
      <div class="cand-bar-bg"><div class="cand-bar" style="width:${barWidth}%;background:${cand.color}"></div></div>
      <div class="cand-stats">
        <span class="cand-total">${votes.toLocaleString()}</span>
        <span class="cand-pct">${pct}%</span>
        ${deltaHtml}
      </div>`;
    body.appendChild(row);
  }
}

function openStandingsSheet() {
  standingsSheetOpen = true;
  buildStandingsSheetContent();
  document.getElementById('standings-sheet').classList.add('open');
  showBackdrop('standings');
}

function closeStandingsSheet() {
  standingsSheetOpen = false;
  document.getElementById('standings-sheet').classList.remove('open');
  if (!townSheetOpen) hideBackdrop();
}

// ── Backdrop ──────────────────────────────────────────────────────
let backdropFor = null;
function showBackdrop(forSheet) {
  backdropFor = forSheet;
  document.getElementById('sheet-backdrop').classList.add('visible');
}
function hideBackdrop() {
  backdropFor = null;
  document.getElementById('sheet-backdrop').classList.remove('visible');
}

document.getElementById('sheet-backdrop').addEventListener('click', () => {
  if (standingsSheetOpen) closeStandingsSheet();
  else if (townSheetOpen) closeTownSheet();
});

// ── Mobile info strip ─────────────────────────────────────────────
function updateMobileStrip() {
  if (!electionData) return;
  const meta = electionData.meta;
  const totals = meta.district_totals[String(currentRound)] || {};
  const continuing = Object.values(totals).reduce((a,b)=>a+b,0);
  const roundInfo = meta.rounds.find(r=>r.round===currentRound);
  const elimIdRaw = roundInfo?.eliminated;
  const elimIds = elimIdRaw ? (Array.isArray(elimIdRaw)?elimIdRaw:[elimIdRaw]) : [];
  const elimNames = elimIds.map(id=>meta.candidates.find(c=>c.id===id)?.name).filter(Boolean).join(' & ');

  let stripLabel = 'ROUND ' + currentRound;
  if (elimNames) stripLabel += ' — ' + elimNames + ' eliminated';
  else if (roundInfo?.winner) {
    const w = meta.candidates.find(c=>c.id===roundInfo.winner);
    if (w) stripLabel += ' — ' + w.name + ' WINS';
  }
  document.getElementById('mobile-strip-round').textContent = stripLabel;

  const barsEl = document.getElementById('mobile-strip-bars');
  barsEl.innerHTML = '';
  const sorted = Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  for (const [candId, votes] of sorted) {
    const cand = meta.candidates.find(c=>c.id===candId);
    if (!cand) continue;
    const pct = continuing > 0 ? (votes/continuing*100).toFixed(1) : '0.0';
    const el = document.createElement('div');
    el.className = 'mobile-strip-cand';
    el.innerHTML = `<div class="mobile-strip-dot" style="background:${cand.color}"></div><span class="mobile-strip-name">${cand.name.split(' ').pop()}</span><span class="mobile-strip-pct"> ${pct}%</span>`;
    barsEl.appendChild(el);
  }

  // round nav
  const rounds = meta.rounds;
  document.getElementById('mobile-round-label').textContent =
    'Round ' + currentRound + ' of ' + rounds.length;
  document.getElementById('mob-prev-btn').disabled = currentRound <= 1;
  document.getElementById('mob-next-btn').disabled = currentRound >= rounds.length;
}

// ── Mobile Geo layer touch handler ────────────────────────────────
function handleMobileTownTap(e) {
  const props = e.target.feature.properties;
  const townName = props.NAME;
  if (townSheetOpen && selectedTown === townName) {
    // Same town — just update; don't close/reopen
    buildTownSheetContent(townName);
    return;
  }
  // New town — update or open
  openTownSheet(townName);
}

function handleDesktopHover(e) {
  showTooltip(e.target.feature.properties);
}
function handleDesktopLeave() {
  hideTooltip();
}
function handleDesktopMove(e) {
  // tooltip follows cursor on desktop — already handled by showTooltip
}
function handleDesktopClick(e) {
  // desktop click: no-op (tooltip already showing)
}

// ── Mobile nav button wiring ──────────────────────────────────────
// goToRound already updates mobile strip; just call it directly.
document.getElementById('mob-prev-btn').addEventListener('click', () => {
  goToRound(currentRound - 1, false);
});
document.getElementById('mob-next-btn').addEventListener('click', () => {
  goToRound(currentRound + 1, true);
});
document.getElementById('mob-replay-btn').addEventListener('click', () => {
  goToRound(currentRound, true);
});
document.getElementById('mobile-info-strip').addEventListener('click', () => {
  openStandingsSheet();
});
document.getElementById('ts-close-btn').addEventListener('click', closeTownSheet);
document.getElementById('ts-pin-btn').addEventListener('click', () => {
  townPinned = !townPinned;
  document.getElementById('ts-pin-btn').classList.toggle('pinned', townPinned);
});
document.getElementById('ss-close').addEventListener('click', closeStandingsSheet);

// ── loadElection already patched inline; updateMobileStrip called from goToRound
// No additional loadElection wrapper needed.

// ── Resize handler ────────────────────────────────────────────────
// Note: layer event handlers are bound at geo layer build time (inside buildGeoLayer).
// A full rebuild would be needed to switch between mobile/desktop on resize, which
// is an edge case we don't need to handle — the page layout change (rotation, etc.)
// will prompt a reload on real devices.
window.addEventListener('resize', () => {
  if (isMobile()) updateMobileStrip();
});


init();
</script>
</body>
</html>
